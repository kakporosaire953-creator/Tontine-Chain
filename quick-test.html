<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Test - TontineChain</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #1a202c;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #718096;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .status {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status.loading {
            background: #fef3c7;
            color: #92400e;
        }
        .status.success {
            background: #d1fae5;
            color: #065f46;
        }
        .status.error {
            background: #fee2e2;
            color: #991b1b;
        }
        .test-item {
            background: #f7fafc;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .test-name {
            font-weight: 600;
            color: #2d3748;
        }
        .test-result {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
        }
        .test-result.pass {
            background: #10b981;
            color: white;
        }
        .test-result.fail {
            background: #ef4444;
            color: white;
        }
        .test-result.pending {
            background: #94a3b8;
            color: white;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .details {
            margin-top: 20px;
            padding: 15px;
            background: #f7fafc;
            border-radius: 10px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        .details.show {
            display: block;
        }
        .spinner {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Quick Test</h1>
        <p class="subtitle">Diagnostic rapide de l'intégration backend</p>

        <div id="status" class="status loading">
            <span class="spinner">⏳</span>
            <span>Initialisation...</span>
        </div>

        <div class="test-item">
            <span class="test-name">Backend Health</span>
            <span id="test-health" class="test-result pending">⏳</span>
        </div>

        <div class="test-item">
            <span class="test-name">API Configuration</span>
            <span id="test-config" class="test-result pending">⏳</span>
        </div>

        <div class="test-item">
            <span class="test-name">Token Storage</span>
            <span id="test-token" class="test-result pending">⏳</span>
        </div>

        <div class="test-item">
            <span class="test-name">CORS Policy</span>
            <span id="test-cors" class="test-result pending">⏳</span>
        </div>

        <button id="runTests" onclick="runAllTests()">▶️ Lancer les Tests</button>
        <button onclick="window.location.href='test-api.html'" style="background: #64748b;">
            🔬 Tests Avancés
        </button>

        <div id="details" class="details"></div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const status = document.getElementById('status');
        const details = document.getElementById('details');
        let testResults = [];

        function updateStatus(message, type = 'loading') {
            status.className = `status ${type}`;
            const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : '⏳';
            status.innerHTML = `<span>${icon}</span><span>${message}</span>`;
        }

        function updateTest(testId, result, message = '') {
            const el = document.getElementById(testId);
            el.className = `test-result ${result}`;
            el.textContent = result === 'pass' ? '✅ OK' : result === 'fail' ? '❌ FAIL' : '⏳';
            
            testResults.push({ test: testId, result, message });
            updateDetails();
        }

        function updateDetails() {
            details.className = 'details show';
            details.innerHTML = testResults.map(r => 
                `<div><strong>${r.test}:</strong> ${r.result} ${r.message ? '- ' + r.message : ''}</div>`
            ).join('');
        }

        async function runAllTests() {
            testResults = [];
            updateStatus('Tests en cours...', 'loading');
            document.getElementById('runTests').disabled = true;

            // Test 1: Backend Health
            try {
                const response = await fetch('https://tonnine-benin-backend.onrender.com/api/v1/health');
                const data = await response.json();
                
                if (data.status === 'ok') {
                    updateTest('test-health', 'pass', 'Backend accessible');
                    updateTest('test-cors', 'pass', 'CORS configuré correctement');
                } else {
                    updateTest('test-health', 'fail', 'Réponse inattendue');
                }
            } catch (error) {
                updateTest('test-health', 'fail', error.message);
                updateTest('test-cors', 'fail', 'Possible problème CORS');
            }

            // Test 2: API Configuration
            try {
                if (typeof API !== 'undefined' && API.request) {
                    updateTest('test-config', 'pass', 'API.js chargé correctement');
                } else {
                    updateTest('test-config', 'fail', 'API.js non chargé');
                }
            } catch (error) {
                updateTest('test-config', 'fail', error.message);
            }

            // Test 3: Token Storage
            try {
                const token = localStorage.getItem('authToken');
                if (token) {
                    updateTest('test-token', 'pass', 'Token trouvé: ' + token.substring(0, 20) + '...');
                } else {
                    updateTest('test-token', 'fail', 'Aucun token (normal si pas connecté)');
                }
            } catch (error) {
                updateTest('test-token', 'fail', error.message);
            }

            // Final status
            const allPassed = testResults.filter(r => r.result === 'pass').length;
            const total = testResults.length;
            
            if (allPassed === total) {
                updateStatus(`✅ Tous les tests réussis (${allPassed}/${total})`, 'success');
            } else if (allPassed > 0) {
                updateStatus(`⚠️ ${allPassed}/${total} tests réussis`, 'error');
            } else {
                updateStatus(`❌ Tous les tests ont échoué`, 'error');
            }

            document.getElementById('runTests').disabled = false;
        }

        // Auto-run on load
        window.addEventListener('load', () => {
            setTimeout(runAllTests, 500);
        });
    </script>
</body>
</html>
