<!DOCTYPE html>
<html lang="fr" data-theme="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gérez votre profil TontineChain">
    <link rel="icon" type="image/jpeg" href="../assets/images/logo-tontinechain.jpeg">
    <title>Mon Profil - TontineChain</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/app.css">
    <link rel="stylesheet" href="../assets/css/theme.css">
    <link rel="stylesheet" href="../assets/css/logo.css">
    <link rel="stylesheet" href="../assets/css/app-premium.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <a href="../index.html" class="brand">
                <div class="logo-icon animate-continuous">
                    <img src="../assets/images/logo-tontinechain.jpeg" alt="TontineChain Logo">
                </div>
                <span class="brand-name"><span class="brand-gold">Tontine</span><span class="brand-blue">Chain</span></span>
            </a>

            <div class="sidebar-theme-toggle dark-mode-container">
                <div class="lang-toggle" aria-label="Changer de langue">
                    <span class="lang-fr active">FR</span>
                    <span>|</span>
                    <span class="lang-fon">FON</span>
                </div>
                <button id="dark-mode-toggle" class="theme-toggle" aria-label="Passer au mode sombre">
                    <i class="fas fa-moon"></i>
                    <span class="sun-icon"><i class="fas fa-sun"></i></span>
                </button>
            </div>
            
            <nav>
                <ul class="sidebar-menu">
                    <li><a href="dashboard.html"><i class="fas fa-home"></i><span>Tableau de bord</span></a></li>
                    <li><a href="mes-tontines.html"><i class="fas fa-users"></i><span>Mes Tontines</span></a></li>
                    <li><a href="messagerie.html"><i class="fas fa-comments"></i><span>Messages</span></a></li>
                    <li><a href="creer-tontine.html"><i class="fas fa-plus-circle"></i><span>Créer une Tontine</span></a></li>
                    <li><a href="paiement.html"><i class="fas fa-credit-card"></i><span>Paiements</span></a></li>
                    <li><a href="assistant-yao.html"><i class="fas fa-robot"></i><span>Assistant IA YAO</span></a></li>
                    <li><a href="profil.html" class="active"><i class="fas fa-user-circle"></i><span>Profil</span></a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <div class="dashboard-header">
                <button class="mobile-sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
                <div>
                    <h1>Mon Profil</h1>
                    <p>Gérez vos informations personnelles</p>
                </div>
            </div>

            <div class="creation-form" style="max-width: 800px; margin: 0 auto;">
                <h2>Informations personnelles</h2>
                <form id="profileForm">
                    <div class="form-group">
                        <label for="nom"><i class="fas fa-user"></i> Nom complet</label>
                        <input type="text" id="nom" value="Adjovi Kossou" required>
                    </div>

                    <div class="form-group">
                        <label for="email"><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="email" value="adjovi@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="telephone"><i class="fas fa-phone"></i> Téléphone</label>
                        <input type="tel" id="telephone" value="+229 97 00 00 00" required>
                    </div>

                    <div class="form-group">
                        <label for="wallet"><i class="fas fa-wallet"></i> Adresse Wallet</label>
                        <input type="text" id="wallet" value="0x742d35Cc6634C0532925a3b844Bc9e7595f0bEb" readonly>
                    </div>

                    <h3 style="margin-top: 2rem; margin-bottom: 1rem;">Sécurité</h3>

                    <div class="form-group">
                        <label for="currentPassword"><i class="fas fa-lock"></i> Mot de passe actuel</label>
                        <input type="password" id="currentPassword">
                    </div>

                    <div class="form-group">
                        <label for="newPassword"><i class="fas fa-key"></i> Nouveau mot de passe</label>
                        <input type="password" id="newPassword">
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword"><i class="fas fa-check"></i> Confirmer le mot de passe</label>
                        <input type="password" id="confirmPassword">
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-outline" onclick="window.location.href='dashboard.html'">Annuler</button>
                        <button type="submit" class="btn btn-primary">Enregistrer les modifications</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="../assets/js/theme.js"></script>
    <script src="../assets/js/i18n.js"></script>
    <script src="../assets/js/dashboard.js"></script>
    <script>
        document.getElementById('profileForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Profil mis à jour avec succès!');
        });
    </script>
</body>
</html>
