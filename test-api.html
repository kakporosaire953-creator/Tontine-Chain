<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API TontineChain</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            background: #0F172A;
            color: #E2E8F0;
        }
        h1 { color: #00C896; }
        .test-section {
            background: #1E293B;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            border-left: 4px solid #00C896;
        }
        button {
            background: #00C896;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
        }
        button:hover { background: #00A67D; }
        .result {
            background: #0F172A;
            padding: 15px;
            margin-top: 10px;
            border-radius: 6px;
            white-space: pre-wrap;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
        .success { color: #00C896; }
        .error { color: #EF4444; }
        input {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #475569;
            background: #0F172A;
            color: white;
            margin: 5px;
        }
    </style>
</head>
<body>
    <h1>🔧 TontineChain API Diagnostic Tool</h1>
    
    <div class="test-section">
        <h2>1. Health Check</h2>
        <button onclick="testHealth()">Test /health</button>
        <div id="health-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>2. Authentication OTP</h2>
        <input type="text" id="phone" placeholder="+22997000000" value="+22997000000">
        <button onclick="testRequestOTP()">Request OTP</button>
        <div id="otp-request-result" class="result"></div>
        
        <br><br>
        <input type="text" id="otp-code" placeholder="Code OTP">
        <button onclick="testVerifyOTP()">Verify OTP</button>
        <div id="otp-verify-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>3. User Profile (Requires Token)</h2>
        <button onclick="testGetProfile()">Get Profile</button>
        <button onclick="testUpdateProfile()">Update Profile (Test)</button>
        <div id="profile-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>4. Groups</h2>
        <button onclick="testGetGroups()">Get Groups</button>
        <div id="groups-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>5. Balance & Stats</h2>
        <button onclick="testGetBalance()">Get Balance</button>
        <button onclick="testGetScore()">Get Score</button>
        <button onclick="testGetPayouts()">Get Payouts</button>
        <div id="stats-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>6. Token Management</h2>
        <button onclick="showToken()">Show Current Token</button>
        <button onclick="clearToken()">Clear Token</button>
        <div id="token-result" class="result"></div>
    </div>

    <!-- Axios CDN -->
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        const log = (elementId, message, isError = false) => {
            const el = document.getElementById(elementId);
            const timestamp = new Date().toLocaleTimeString();
            const className = isError ? 'error' : 'success';
            el.innerHTML = `<span class="${className}">[${timestamp}]</span>\n${JSON.stringify(message, null, 2)}`;
        };

        async function testHealth() {
            try {
                const response = await fetch('https://tonnine-benin-backend.onrender.com/api/v1/health');
                const data = await response.json();
                log('health-result', { status: response.status, data });
            } catch (error) {
                log('health-result', { error: error.message }, true);
            }
        }

        async function testRequestOTP() {
            try {
                const phone = document.getElementById('phone').value;
                const result = await API.auth.requestOTP(phone);
                log('otp-request-result', result);
            } catch (error) {
                log('otp-request-result', { error: error.message }, true);
            }
        }

        async function testVerifyOTP() {
            try {
                const phone = document.getElementById('phone').value;
                const code = document.getElementById('otp-code').value;
                const result = await API.auth.verifyOTP(phone, code);
                log('otp-verify-result', result);
                if (result.token || result.access_token) {
                    localStorage.setItem('authToken', result.token || result.access_token);
                    alert('Token saved! You can now test authenticated endpoints.');
                }
            } catch (error) {
                log('otp-verify-result', { error: error.message }, true);
            }
        }

        async function testGetProfile() {
            try {
                const result = await API.user.getProfile();
                log('profile-result', result);
            } catch (error) {
                log('profile-result', { error: error.message }, true);
            }
        }

        async function testUpdateProfile() {
            try {
                const result = await API.user.updateProfile({
                    first_name: 'Test',
                    last_name: 'User',
                    profession: 'Developer'
                });
                log('profile-result', result);
            } catch (error) {
                log('profile-result', { error: error.message }, true);
            }
        }

        async function testGetGroups() {
            try {
                const result = await API.groups.list();
                log('groups-result', result);
            } catch (error) {
                log('groups-result', { error: error.message }, true);
            }
        }

        async function testGetBalance() {
            try {
                const result = await API.user.getBalance();
                log('stats-result', result);
            } catch (error) {
                log('stats-result', { error: error.message }, true);
            }
        }

        async function testGetScore() {
            try {
                const result = await API.user.getScore();
                log('stats-result', result);
            } catch (error) {
                log('stats-result', { error: error.message }, true);
            }
        }

        async function testGetPayouts() {
            try {
                const result = await API.user.getPayouts();
                log('stats-result', result);
            } catch (error) {
                log('stats-result', { error: error.message }, true);
            }
        }

        function showToken() {
            const token = localStorage.getItem('authToken');
            log('token-result', { token: token || 'No token found' });
        }

        function clearToken() {
            localStorage.removeItem('authToken');
            log('token-result', { message: 'Token cleared' });
        }

        // Auto-test health on load
        window.addEventListener('load', testHealth);
    </script>
</body>
</html>
