# }

# ══════════════════════════════════════════════════════════════
# PROTECTION DES FICHIERS SENSIBLES
# ══════════════════════════════════════════════════════════════

# Bloquer l'accès aux fichiers .md
location ~* \.(md|markdown)$ {
    deny all;
}

# Bloquer l'accès aux fichiers de configuration
location ~ /\.(htaccess|htpasswd|env) {
    deny all;
}

location ~ /(package|composer)\.(json|lock)$ {
    deny all;
}

# ══════════════════════════════════════════════════════════════
# OPTIMISATION
# ══════════════════════════════════════════════════════════════

# Désactiver les logs d'accès pour les fichiers statiques
location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|otf|eot)$ {
    access_log off;
}

# Désactiver la signature du serveur
server_tokens off;
