# TontineChain - Configuration Nginx
# Headers de Sécurité et Optimisation

# ══════════════════════════════════════════════════════════════
# HEADERS DE SÉCURITÉ
# ══════════════════════════════════════════════════════════════

# Content Security Policy (CSP)
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none';" always;

# Protection contre le clickjacking
add_header X-Frame-Options "DENY" always;

# Protection contre le MIME sniffing
add_header X-Content-Type-Options "nosniff" always;

# Protection XSS
add_header X-XSS-Protection "1; mode=block" always;

# Referrer Policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions Policy
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

# HSTS (HTTPS uniquement - décommenter si HTTPS activé)
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# ══════════════════════════════════════════════════════════════
# COMPRESSION GZIP
# ══════════════════════════════════════════════════════════════

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

# ══════════════════════════════════════════════════════════════
# CACHE NAVIGATEUR
# ══════════════════════════════════════════════════════════════

# Images
location ~* \.(jpg|jpeg|png|gif|ico|webp|svg)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}

# CSS et JavaScript
location ~* \.(css|js)$ {
    expires 1M;
    add_header Cache-Control "public";
}

# Fonts
location ~* \.(ttf|otf|woff|woff2|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}

# HTML
location ~* \.html$ {
    expires 0;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
}

# ══════════════════════════════════════════════════════════════
# REDIRECTIONS HTTPS (décommenter si HTTPS activé)
# ══════════════════════════════════════════════════════════════

# server {
