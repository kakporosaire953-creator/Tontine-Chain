<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>🔍 DIAGNOSTIC COMPLET</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #00C896; margin-bottom: 20px; font-size: 24px; }
        .section {
            background: #1e293b;
            padding: 20px;
            margin: 15px 0;
            border-radius: 8px;
            border-left: 4px solid #00C896;
        }
        .section h2 {
            color: #00C896;
            font-size: 18px;
            margin-bottom: 15px;
        }
        .test-item {
            background: #0f172a;
            padding: 12px;
            margin: 8px 0;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status {
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
        }
        .success { background: #00C896; color: #0f172a; }
        .error { background: #EF4444; color: white; }
        .warning { background: #F59E0B; color: #0f172a; }
        .info { background: #3B82F6; color: white; }
        button {
            background: #00C896;
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            margin: 10px 5px;
        }
        button:hover { background: #00A87B; }
        .code {
            background: #0f172a;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            margin: 10px 0;
            font-size: 12px;
            border: 1px solid #334155;
        }
        .log {
            background: #0f172a;
            padding: 15px;
            border-radius: 4px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 11px;
            margin: 10px 0;
            border: 1px solid #334155;
        }
        .log-entry { margin: 4px 0; }
        .log-error { color: #EF4444; }
        .log-success { color: #00C896; }
        .log-info { color: #3B82F6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 DIAGNOSTIC COMPLET - TontineChain</h1>
        
        <div class="section">
            <h2>1. VERIFICATION DES FICHIERS</h2>
            <div id="files-check"></div>
        </div>

        <div class="section">
            <h2>2. TEST BACKEND</h2>
            <button onclick="testBackend()">🚀 Tester le Backend</button>
            <div id="backend-result"></div>
        </div>

        <div class="section">
            <h2>3. TEST API.JS</h2>
            <button onclick="testAPIObject()">🔌 Tester API Object</button>
            <div id="api-result"></div>
        </div>

        <div class="section">
            <h2>4. TEST AUTHENTIFICATION</h2>
            <button onclick="testAuth()">🔐 Tester Auth</button>
            <div id="auth-result"></div>
        </div>

        <div class="section">
            <h2>5. CONSOLE LOGS</h2>
            <div id="console-logs" class="log"></div>
        </div>
    </div>

    <script>
        // Capture console logs
        const logs = [];
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;

        console.log = function(...args) {
            logs.push({ type: 'info', message: args.join(' '), time: new Date().toLocaleTimeString() });
            updateConsoleLogs();
            originalLog.apply(console, args);
        };

        console.error = function(...args) {
            logs.push({ type: 'error', message: args.join(' '), time: new Date().toLocaleTimeString() });
            updateConsoleLogs();
            originalError.apply(console, args);
        };

        console.warn = function(...args) {
            logs.push({ type: 'warning', message: args.join(' '), time: new Date().toLocaleTimeString() });
            updateConsoleLogs();
            originalWarn.apply(console, args);
        };

        function updateConsoleLogs() {
            const container = document.getElementById('console-logs');
            container.innerHTML = logs.map(log => 
                `<div class="log-entry log-${log.type}">[${log.time}] ${log.message}</div>`
            ).join('');
            container.scrollTop = container.scrollHeight;
        }

        // 1. Vérification des fichiers
        function checkFiles() {
            const container = document.getElementById('files-check');
            let html = '';

            // Check if API object exists
            const apiExists = typeof API !== 'undefined';
            html += `<div class="test-item">
                <span>API object chargé</span>
                <span class="status ${apiExists ? 'success' : 'error'}">${apiExists ? '✅ OUI' : '❌ NON'}</span>
            </div>`;

            if (apiExists) {
                html += `<div class="test-item">
                    <span>API.auth</span>
                    <span class="status ${typeof API.auth !== 'undefined' ? 'success' : 'error'}">${typeof API.auth !== 'undefined' ? '✅' : '❌'}</span>
                </div>`;
                html += `<div class="test-item">
                    <span>API.user</span>
                    <span class="status ${typeof API.user !== 'undefined' ? 'success' : 'error'}">${typeof API.user !== 'undefined' ? '✅' : '❌'}</span>
                </div>`;
                html += `<div class="test-item">
                    <span>API.groups</span>
                    <span class="status ${typeof API.groups !== 'undefined' ? 'success' : 'error'}">${typeof API.groups !== 'undefined' ? '✅' : '❌'}</span>
                </div>`;
            }

            const dashboardApiExists = typeof loadDashboardData !== 'undefined';
            html += `<div class="test-item">
                <span>loadDashboardData function</span>
                <span class="status ${dashboardApiExists ? 'success' : 'error'}">${dashboardApiExists ? '✅ OUI' : '❌ NON'}</span>
            </div>`;

            const token = localStorage.getItem('authToken');
            html += `<div class="test-item">
                <span>Token d'authentification</span>
                <span class="status ${token ? 'success' : 'warning'}">${token ? '✅ PRESENT' : '⚠️ ABSENT'}</span>
            </div>`;

            container.innerHTML = html;
        }

        // 2. Test Backend
        async function testBackend() {
            const container = document.getElementById('backend-result');
            container.innerHTML = '<div class="code">⏳ Test en cours...</div>';

            try {
                console.log('[TEST] Testing backend health...');
                const response = await fetch('https://tonnine-benin-backend.onrender.com/api/v1/health');
                const data = await response.json();

                container.innerHTML = `
                    <div class="test-item">
                        <span>Health Endpoint</span>
                        <span class="status success">✅ ${response.status}</span>
                    </div>
                    <div class="code">${JSON.stringify(data, null, 2)}</div>
                `;
                console.log('[TEST] Backend health OK:', data);
            } catch (error) {
                container.innerHTML = `
                    <div class="test-item">
                        <span>Health Endpoint</span>
                        <span class="status error">❌ ERROR</span>
                    </div>
                    <div class="code">${error.message}</div>
                `;
                console.error('[TEST] Backend health ERROR:', error);
            }
        }

        // 3. Test API Object
        async function testAPIObject() {
            const container = document.getElementById('api-result');
            
            if (typeof API === 'undefined') {
                container.innerHTML = `
                    <div class="test-item">
                        <span>API Object</span>
                        <span class="status error">❌ NON CHARGE</span>
                    </div>
                    <div class="code">Le fichier js/api.js n'est pas chargé ou a une erreur de syntaxe.</div>
                `;
                return;
            }

            container.innerHTML = '<div class="code">⏳ Test en cours...</div>';

            try {
                console.log('[TEST] Testing API.groups.list()...');
                const groups = await API.groups.list();
                
                container.innerHTML = `
                    <div class="test-item">
                        <span>API.groups.list()</span>
                        <span class="status success">✅ SUCCESS</span>
                    </div>
                    <div class="code">Nombre de groupes: ${groups.length}\n\n${JSON.stringify(groups, null, 2)}</div>
                `;
                console.log('[TEST] API.groups.list() OK:', groups);
            } catch (error) {
                container.innerHTML = `
                    <div class="test-item">
                        <span>API.groups.list()</span>
                        <span class="status error">❌ ERROR</span>
                    </div>
                    <div class="code">${error.message}\n\nSi l'erreur est "401", vous devez vous connecter d'abord.</div>
                `;
                console.error('[TEST] API.groups.list() ERROR:', error);
            }
        }

        // 4. Test Auth
        async function testAuth() {
            const container = document.getElementById('auth-result');
            const token = localStorage.getItem('authToken');

            if (!token) {
                container.innerHTML = `
                    <div class="test-item">
                        <span>Authentification</span>
                        <span class="status warning">⚠️ PAS CONNECTE</span>
                    </div>
                    <div class="code">Vous devez vous connecter sur login.html d'abord.</div>
                `;
                return;
            }

            container.innerHTML = '<div class="code">⏳ Test en cours...</div>';

            try {
                console.log('[TEST] Testing API.user.getProfile()...');
                const user = await API.user.getProfile();
                
                container.innerHTML = `
                    <div class="test-item">
                        <span>API.user.getProfile()</span>
                        <span class="status success">✅ SUCCESS</span>
                    </div>
                    <div class="code">${JSON.stringify(user, null, 2)}</div>
                `;
                console.log('[TEST] API.user.getProfile() OK:', user);
            } catch (error) {
                container.innerHTML = `
                    <div class="test-item">
                        <span>API.user.getProfile()</span>
                        <span class="status error">❌ ERROR</span>
                    </div>
                    <div class="code">${error.message}</div>
                `;
                console.error('[TEST] API.user.getProfile() ERROR:', error);
            }
        }

        // Auto-run on load
        window.addEventListener('DOMContentLoaded', () => {
            console.log('[DIAGNOSTIC] Page chargée');
            checkFiles();
        });
    </script>

    <!-- Load API scripts -->
    <script src="js/api.js"></script>
    <script src="js/dashboard-api.js"></script>
</body>
</html>
